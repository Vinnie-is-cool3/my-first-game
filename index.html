<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Awesome Neon Platformer</title>
    <style>
        body {
            margin: 0;
            background-color: #222; /* Dark background to make colors pop */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            color: white;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #555;
            background-color: #00d2ff; /* Bright sky blue */
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .ui {
            position: absolute;
            top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="ui">
        <h1>Neon Leap!</h1>
        <p>Arrows to Move | Space to Jump</p>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = 800;
    canvas.height = 400;

    // --- Game Variables ---
    const gravity = 0.8;
    const keys = {};

    const player = {
        x: 50,
        y: 300,
        width: 30,
        height: 30,
        color: '#FF00FF', // Hot Pink
        dx: 0, // Horizontal speed
        dy: 0, // Vertical speed
        jumpPower: -15,
        grounded: false
    };

    const platforms = [
        { x: 0, y: 370, width: 800, height: 30, color: '#33ff00' },   // The Floor
        { x: 200, y: 280, width: 150, height: 20, color: '#ffcc00' }, // Yellow Platform
        { x: 450, y: 200, width: 150, height: 20, color: '#ffcc00' }, // Yellow Platform
        { x: 150, y: 130, width: 150, height: 20, color: '#ffcc00' }  // Yellow Platform
    ];

    const goal = {
        x: 40,
        y: 70,
        width: 40,
        height: 40,
        color: '#FFF000' // Shiny Gold
    };

    // --- Input Handling ---
    window.addEventListener('keydown', (e) => keys[e.code] = true);
    window.addEventListener('keyup', (e) => keys[e.code] = false);

    // --- Core Logic ---
    function update() {
        // Horizontal Movement
        if (keys['ArrowRight']) player.dx = 5;
        else if (keys['ArrowLeft']) player.dx = -5;
        else player.dx = 0;

        // Jumping
        if (keys['Space'] && player.grounded) {
            player.dy = player.jumpPower;
            player.grounded = false;
        }

        // Apply Physics
        player.dy += gravity;
        player.x += player.dx;
        player.y += player.dy;

        // Floor and Platform Collisions
        player.grounded = false;
        for (let plat of platforms) {
            if (player.x < plat.x + plat.width &&
                player.x + player.width > plat.x &&
                player.y < plat.y + plat.height &&
                player.y + player.height > plat.y) {
                
                // If falling onto the top of a platform
                if (player.dy > 0) {
                    player.grounded = true;
                    player.dy = 0;
                    player.y = plat.y - player.height;
                }
            }
        }

        // Check Goal
        if (player.x < goal.x + goal.width &&
            player.x + player.width > goal.x &&
            player.y < goal.y + goal.height &&
            player.y + player.height > goal.y) {
            alert("YOU WIN! High five!");
            player.x = 50;
            player.y = 300;
        }

        // Keep player in bounds (Screen Wrap or Stop)
        if (player.x < 0) player.x = 0;
        if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
    }

    // --- Drawing ---
    function draw() {
        // Clear screen
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Platforms
        platforms.forEach(plat => {
            ctx.fillStyle = plat.color;
            ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
        });

        // Draw Goal
        ctx.fillStyle = goal.color;
        ctx.fillRect(goal.x, goal.y, goal.width, goal.height);
        ctx.strokeStyle = "white";
        ctx.lineWidth = 3;
        ctx.strokeRect(goal.x, goal.y, goal.width, goal.height);

        // Draw Player
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.width, player.height);
        // Give player a little "eye" so we know which way they face
        ctx.fillStyle = "white";
        ctx.fillRect(player.x + (player.dx >= 0 ? 20 : 5), player.y + 5, 5, 5);
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>
</body>
</html>
